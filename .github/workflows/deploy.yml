name: Deploy to cPanel via Pull

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2

      - name: 🚀 Upload root .htaccess via FTP
        run: |
          curl -sS --ssl-reqd --insecure --disable-epsv --ftp-pasv \
            -T .htaccess \
            ftp://${{ secrets.FTP_SERVER }}/.htaccess \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"

      - name: 🚀 Upload extract.php via FTP
        run: |
          curl -sS --ssl-reqd --insecure --disable-epsv --ftp-pasv \
            -T public/extract.php \
            ftp://${{ secrets.FTP_SERVER }}/public/extract.php \
            --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"

      - name: 🛠️ Trigger Live Extraction and Migrations
        run: |
          echo "Triggering deployment webhook..."
          curl -sS --max-time 300 "https://admin.magnacredited.com/extract.php?token=${{ secrets.DEPLOY_TOKEN }}&seed=1" || echo "⚠️ Webhook timed out or failed — check server logs"
