name: Deploy to cPanel via FTP

on:
  push:
    branches:
      - master

permissions:
  contents: read
  issues: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
        
      - name: 🔧 Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite3, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: 🔐 Add Flux Credentials
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: 📦 Install Composer Dependencies
        run: composer install --optimize-autoloader --no-dev

      - name: 🗜️ Bundle Application into release.zip
        run: zip -r release.zip . -x "*.git*" "node_modules/*" "tests/*" "storage/logs/*"

      - name: 🚀 Upload files via FTP
        run: |
          if ! curl -v --ssl-reqd --insecure --disable-epsv --ftp-pasv -T release.zip ftp://${{ secrets.FTP_SERVER }}/release.zip --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}" > ftp_log.txt 2>&1; then
            echo "FTP Upload Failed! Creating GitHub Issue with logs..."
            gh issue create --title "🚨 Automated FTP Error Log" --body "$(cat ftp_log.txt)" --repo ${{ github.repository }}
            exit 1
          fi
          curl -v --ssl-reqd --insecure --disable-epsv --ftp-pasv -T public/extract.php ftp://${{ secrets.FTP_SERVER }}/public/extract.php --ftp-create-dirs --user "${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🛠️ Trigger Live Extraction and Migrations
        run: |
          curl -sS "https://admin.magnacredited.com/extract.php?token=${{ secrets.DEPLOY_TOKEN }}"
